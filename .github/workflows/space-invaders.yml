name: Generate Space Invaders

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: threeal/github-action-space-invaders@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          max-ammo: 30
      - uses: EndBug/add-and-commit@v9
        with:
          add: dist
          message: "Update Space Invaders animation"
