name: Generate Space Invaders

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Space Invaders
        uses: Platane/snk@v3
        with:
          github_user_name: nagrajhegde834
          outputs: |
            dist/space-invaders.gif?color_snake=purple&color_dots=#0d1117,#1a1a2e,#16213e,#0f3460,#533483

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
