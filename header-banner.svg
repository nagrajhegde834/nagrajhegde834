<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="300" viewBox="0 0 1000 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- Terminal code lines LEFT side -->
  <text x="30" y="35" font-family="Courier New, monospace" font-size="11" fill="#1e3a5f" opacity="0.9">const developer = {</text>
  <text x="30" y="52" font-family="Courier New, monospace" font-size="11" fill="#0d4a2a" opacity="0.9">  name: "Nagaraj Hegde",</text>
  <text x="30" y="69" font-family="Courier New, monospace" font-size="11" fill="#1a3a6a" opacity="0.9">  role: "Java Backend Developer",</text>
  <text x="30" y="86" font-family="Courier New, monospace" font-size="11" fill="#0d4a2a" opacity="0.9">  stack: ["Spring Boot", "Hibernate"],</text>
  <text x="30" y="103" font-family="Courier New, monospace" font-size="11" fill="#1e3a5f" opacity="0.9">  ai: ["Spring AI", "LLM", "RAG"],</text>
  <text x="30" y="120" font-family="Courier New, monospace" font-size="11" fill="#0d4a2a" opacity="0.9">  db: ["MySQL", "MongoDB"],</text>
  <text x="30" y="137" font-family="Courier New, monospace" font-size="11" fill="#1a3a6a" opacity="0.9">  build: ["Maven", "Gradle"],</text>
  <text x="30" y="154" font-family="Courier New, monospace" font-size="11" fill="#0d4a2a" opacity="0.9">  tools: ["Docker", "Git", "REST API"],</text>
  <text x="30" y="171" font-family="Courier New, monospace" font-size="11" fill="#1e3a5f" opacity="0.9">  goal: "Agentic AI Engineer",</text>
  <text x="30" y="188" font-family="Courier New, monospace" font-size="11" fill="#0d4a2a" opacity="0.9">};</text>
  <text x="30" y="215" font-family="Courier New, monospace" font-size="11" fill="#1a3a6a" opacity="0.7">// Building scalable AI systems</text>
  <text x="30" y="232" font-family="Courier New, monospace" font-size="11" fill="#0d4a2a" opacity="0.7">function buildFuture() {</text>
  <text x="30" y="249" font-family="Courier New, monospace" font-size="11" fill="#1e3a5f" opacity="0.7">  return "Backend + AI Magic 🚀";</text>
  <text x="30" y="266" font-family="Courier New, monospace" font-size="11" fill="#0d4a2a" opacity="0.7">}</text>
  <rect x="30" y="272" width="8" height="14" fill="#818cf8" opacity="0.6"/>

  <!-- Vertical divider -->
  <rect x="490" y="20" width="1" height="260" fill="#818cf8" opacity="0.15"/>

  <!-- RIGHT side - Name -->
  <text x="980" y="95" text-anchor="end"
        font-family="Arial Black, Arial, sans-serif"
        font-size="50" font-weight="900"
        fill="#ffffff">Nagaraj Hegde</text>

  <!-- Title -->
  <text x="980" y="130" text-anchor="end"
        font-family="Arial, sans-serif"
        font-size="20" font-weight="400"
        fill="#ec4899">Java Backend Developer</text>

  <!-- Email -->
  <text x="980" y="157" text-anchor="end"
        font-family="Arial, sans-serif"
        font-size="13"
        fill="#94a3b8">@ nagarajhegde174@gmail.com</text>

  <!-- Divider -->
  <rect x="510" y="172" width="470" height="1" fill="#818cf8" opacity="0.3"/>

  <!-- Skills label -->
  <text x="515" y="192" font-family="Arial, sans-serif" font-size="11" fill="#64748b">TECH STACK</text>

  <!-- Skill icons using image tags from devicons CDN -->
  <!-- Java -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" x="510" y="200" width="36" height="36"/>
  <!-- Spring -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/spring/spring-original.svg" x="554" y="200" width="36" height="36"/>
  <!-- Hibernate -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/hibernate/hibernate-plain.svg" x="598" y="200" width="36" height="36"/>
  <!-- MySQL -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg" x="642" y="200" width="36" height="36"/>
  <!-- MongoDB -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mongodb/mongodb-original.svg" x="686" y="200" width="36" height="36"/>
  <!-- Maven -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/maven/maven-original.svg" x="730" y="200" width="36" height="36"/>
  <!-- Gradle -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/gradle/gradle-original.svg" x="774" y="200" width="36" height="36"/>
  <!-- Docker -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg" x="818" y="200" width="36" height="36"/>
  <!-- Git -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg" x="862" y="200" width="36" height="36"/>
  <!-- Postman -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postman/postman-original.svg" x="906" y="200" width="36" height="36"/>
  <!-- IntelliJ -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/intellij/intellij-original.svg" x="950" y="200" width="36" height="36"/>

</svg>
